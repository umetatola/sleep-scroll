name: Build Safari iOS Extension

on:
  push:
    branches: [main]
    paths:
      - 'safari-extension/**'
      - '.github/workflows/safari-ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Convert web extension to Xcode project
        run: |
          xcrun safari-web-extension-converter \
            --ios-only \
            --app-name "sleep-scroll" \
            --bundle-identifier com.sleepscroll.app \
            --swift \
            --no-open \
            safari-extension/

      - name: Discover generated project and scheme
        id: proj
        run: |
          PROJECT=$(find . -name "*.xcodeproj" -not -path "*/DerivedData/*" | head -1)
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "Found project: $PROJECT"

          SCHEME=$(xcodebuild -list -project "$PROJECT" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep "iOS" | head -1 | xargs)
          # Fallback: first scheme
          if [ -z "$SCHEME" ]; then
            SCHEME=$(xcodebuild -list -project "$PROJECT" 2>/dev/null \
              | awk '/Schemes:/,0' | grep -v "Schemes:" | head -1 | xargs)
          fi
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Found scheme: $SCHEME"

      - name: Build for iOS device (unsigned)
        run: |
          xcodebuild build \
            -project "${{ steps.proj.outputs.project }}" \
            -scheme "${{ steps.proj.outputs.scheme }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            STRIP_INSTALLED_PRODUCT=NO \
            COPY_PHASE_STRIP=NO \
            2>&1 | tail -80

      - name: Package as unsigned IPA
        run: |
          echo "=== All .app bundles found ==="
          find DerivedData -name "*.app" | sort

          # Find the main app (not extension) built for iphoneos
          APP_PATH=$(find DerivedData -name "*.app" \
            | grep -v "\.appex" \
            | grep -i "iphoneos" \
            | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Falling back to any .app in DerivedData"
            APP_PATH=$(find DerivedData -name "*.app" | grep -v "\.appex" | head -1)
          fi

          echo "Packaging: $APP_PATH"

          # Verify Info.plist exists
          if [ ! -f "$APP_PATH/Info.plist" ]; then
            echo "ERROR: Info.plist not found in $APP_PATH"
            echo "Contents of app bundle:"
            ls -la "$APP_PATH"
            exit 1
          fi

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r sleep-scroll.ipa Payload/
          ls -lh sleep-scroll.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: sleep-scroll-ios-unsigned
          path: sleep-scroll.ipa
          retention-days: 30
