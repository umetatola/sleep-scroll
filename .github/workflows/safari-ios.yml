name: Build Safari iOS Extension

on:
  push:
    branches: [main]
    paths:
      - 'safari-extension/**'
      - '.github/workflows/safari-ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Convert web extension to Xcode project
        run: |
          xcrun safari-web-extension-converter \
            --ios-only \
            --app-name "sleep-scroll" \
            --bundle-identifier com.sleepscroll.app \
            --swift \
            --no-open \
            safari-extension/

      - name: Add app icon to generated Xcode project
        run: |
          RESOURCES_DIR=$(find . -name "Resources" \
            -not -path "*/DerivedData/*" -not -path "*/.git/*" | head -1)
          echo "Resources dir: $RESOURCES_DIR"
          mkdir -p "$RESOURCES_DIR"
          cat > /tmp/make_icon.py << 'PYEOF'
          import struct, zlib, sys
          def make_png(w, h, rgb=(0, 128, 128)):
              def chunk(name, data):
                  crc = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', crc)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              row = b'\x00' + bytes(rgb) * w
              idat = zlib.compress(row * h)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          open(sys.argv[1], 'wb').write(make_png(128, 128))
          PYEOF
          python3 /tmp/make_icon.py "$RESOURCES_DIR/Icon.png"
          ls -lh "$RESOURCES_DIR/Icon.png"

      - name: Discover generated project and scheme
        id: proj
        run: |
          PROJECT=$(find . -name "*.xcodeproj" -not -path "*/DerivedData/*" | head -1)
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "Found project: $PROJECT"

          SCHEME=$(xcodebuild -list -project "$PROJECT" 2>/dev/null \
            | awk '/Schemes:/,0' | grep -v "Schemes:" | grep "iOS" | head -1 | xargs)
          if [ -z "$SCHEME" ]; then
            SCHEME=$(xcodebuild -list -project "$PROJECT" 2>/dev/null \
              | awk '/Schemes:/,0' | grep -v "Schemes:" | head -1 | xargs)
          fi
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Found scheme: $SCHEME"

      - name: Archive for iOS device (unsigned)
        run: |
          xcodebuild archive \
            -project "${{ steps.proj.outputs.project }}" \
            -scheme "${{ steps.proj.outputs.scheme }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$PWD/build/sleep-scroll.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            2>&1 | tail -80

      - name: Package as unsigned IPA
        run: |
          echo "=== Archive .app bundles found ==="
          find build/sleep-scroll.xcarchive -name "*.app" | sort

          APP_PATH=$(find build/sleep-scroll.xcarchive -name "*.app" \
            | grep -v "\.appex" \
            | head -1)

          echo "Packaging: $APP_PATH"
          echo "=== App bundle contents ==="
          ls -la "$APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r sleep-scroll.ipa Payload/
          ls -lh sleep-scroll.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: sleep-scroll-ios-unsigned
          path: sleep-scroll.ipa
          retention-days: 30
