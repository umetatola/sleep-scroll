<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Generate sleep-scroll icons</title>
  <style>
    body { background: #0a0816; color: #e0d8f4; font-family: sans-serif; padding: 40px; }
    h1 { margin-bottom: 24px; }
    .row { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    canvas { border-radius: 8px; }
    a { color: #c090f0; font-size: 14px; }
  </style>
</head>
<body>
  <h1>🌙 sleep-scroll icon generator</h1>
  <p style="color:#5a4878;margin-bottom:24px">Click each link to download the PNG. Then place the files in <code>extension/icons/</code>.</p>
  <div id="output"></div>

  <script>
    function drawIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Rounded background
      const r = size * 0.22;
      ctx.fillStyle = '#0a0816';
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();

      // Crescent moon
      const cx = size * 0.52;
      const cy = size * 0.50;
      const moonR = size * 0.30;

      // Full circle (light purple)
      ctx.fillStyle = '#c090f0';
      ctx.beginPath();
      ctx.arc(cx, cy, moonR, 0, Math.PI * 2);
      ctx.fill();

      // Cutout circle to make crescent
      ctx.fillStyle = '#0a0816';
      ctx.beginPath();
      ctx.arc(cx + moonR * 0.42, cy - moonR * 0.08, moonR * 0.78, 0, Math.PI * 2);
      ctx.fill();

      return canvas;
    }

    const sizes = [16, 32, 48, 128];
    const out = document.getElementById('output');

    sizes.forEach(size => {
      const canvas = drawIcon(size);
      const dataUrl = canvas.toDataURL('image/png');

      const row = document.createElement('div');
      row.className = 'row';

      // Show at 2x for visibility
      const preview = drawIcon(Math.max(size, 64));
      preview.style.width = '64px';
      preview.style.height = '64px';
      preview.style.imageRendering = 'pixelated';

      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = `icon${size}.png`;
      link.textContent = `⬇ Download icon${size}.png  (${size}×${size})`;

      row.appendChild(preview);
      row.appendChild(link);
      out.appendChild(row);
    });
  </script>
</body>
</html>
