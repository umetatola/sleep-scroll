<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>sleep-scroll — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="wrap">

    <header>
      <span>🌙</span>
      <h1>sleep-scroll settings</h1>
    </header>

    <section>
      <h2>Active sites</h2>
      <p class="hint">Show overlays on these sites during sleep mode</p>
      <div class="site-list" id="site-list"></div>
    </section>

    <section>
      <h2>Intensity</h2>
      <p class="hint">How persistent the overlays are</p>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="mode" value="normal" />
          <span class="radio-info">
            <span class="radio-name">Normal</span>
            <span class="radio-hint">Reminders can be dismissed, snooze available</span>
          </span>
        </label>
        <label class="radio-label">
          <input type="radio" name="mode" value="strict" />
          <span class="radio-info">
            <span class="radio-name">Strict</span>
            <span class="radio-hint">No dismiss, no snooze — commits you to sleep</span>
          </span>
        </label>
      </div>
    </section>

    <div class="footer">
      <button id="btn-save" class="btn-save">Save settings</button>
      <p class="saved-msg hidden" id="saved-msg">✓ Saved</p>
    </div>

  </div>
  <script src="options.js"></script>
</body>
</html>
